<p>Todos</p>

@if (!todoItems().length) {
  <p>Loading...</p>
}
<form>
  <label>
    Filter Todos
    <input name="searchTerm"
           [(ngModel)]="searchTerm"
           type="text"
           placeholder="Search todos..."
    >
  </label>
</form>


<ul>
  @for (todo of todoItems() | filterTodos : searchTerm(); track todo.id) {
    <app-todo-item [todo]="todo" (todoToggle)="toggleCompleted(todo)"/>
  }
</ul>
